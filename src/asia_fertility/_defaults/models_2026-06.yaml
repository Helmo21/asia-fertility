    context_window: 2000000
    sizing_tokenizer: openai/o200k_base
    native_tokenizer: google/gemini
    routes: {openrouter: google/gemini-2.5-pro, native: gemini-2.5-pro}
    benchmarked_in: []

  google/gemma-2-27b:
    family: google
    pricing: {input: 0.40, output: 0.40}
    context_window: 128000
    sizing_tokenizer: google/gemma-2
    native_tokenizer: google/gemma-2
    routes: {openrouter: google/gemma-2-27b, native: null}
    benchmarked_in: []

  qwen/qwen3-72b-instruct:
    family: qwen
    pricing: {input: 0.60, output: 1.20}
    context_window: 131072
    sizing_tokenizer: qwen/qwen3
    native_tokenizer: qwen/qwen3
    routes: {openrouter: qwen/qwen3-72b-instruct, native: null}
    benchmarked_in: []

  mistral/mistral-large:
    family: mistral
    pricing: {input: 2.00, output: 6.00}
    context_window: 131072
    sizing_tokenizer: mistral/tekken
    native_tokenizer: mistral/tekken
    routes: {openrouter: mistral/mistral-large, native: null}
