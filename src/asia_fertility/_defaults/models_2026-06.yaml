    sizing_tokenizer: openai/cl100k_base
    native_tokenizer: openai/cl100k_base
    routes: {openrouter: openai/gpt-3.5-turbo, native: gpt-3.5-turbo}
    benchmarked_in: []

  anthropic/claude-opus-4-7:
    family: anthropic
    pricing: {input: 15.00, output: 75.00}
