  cohere/aya-expanse-8b:
    family: cohere
    pricing: {input: 0.30, output: 0.30}
    context_window: 32768
    sizing_tokenizer: cohere/aya-expanse
    native_tokenizer: cohere/aya-expanse
    routes: {openrouter: cohere/aya-expanse-8b, native: null}
    benchmarked_in: []

  # =====================================================================
  # ID ALIASES (kept for backward-compatibility with v0.3.x clients).
  # Same pricing as the canonical entry; resolve via alias_of.
  # =====================================================================
  meta/llama-3.1-8b-instruct:
    family: meta
    pricing: {input: 0.06, output: 0.06}
    context_window: 128000
    sizing_tokenizer: openai/o200k_base
    native_tokenizer: meta/llama-3.1
    routes: {openrouter: meta-llama/llama-3.1-8b-instruct, native: null}
    benchmarked_in: []
    alias_of: meta-llama/llama-3.1-8b-instruct

  deepseek/deepseek-v3:
    family: deepseek
    pricing: {input: 0.27, output: 1.10}
    context_window: 128000
    sizing_tokenizer: openai/o200k_base
    native_tokenizer: deepseek/v3
    routes: {openrouter: deepseek/deepseek-chat-v3-0324, native: null}
    benchmarked_in: []
