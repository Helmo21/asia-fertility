name: Publish to PyPI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify version matches tag
        run: |
          PROJECT_VERSION=$(uv run --extra dev python -c "import asia_fertility; print(asia_fertility.__version__)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Mismatch: pyproject.toml version=$PROJECT_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
      - run: uv build
      - name: Validate built artifacts
        run: |
          uv pip install --system twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, 'rc') }}
    environment:
      name: pypi
      url: https://pypi.org/p/asia-fertility
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Disable sigstore attestations — the rekor.sigstore.dev transparency
          # log is flaky (intermittent 502 Bad Gateway). The PyPI Trusted
          # Publisher OIDC handshake itself does not require sigstore;
          # attestations are a nice-to-have we can re-enable later.
          attestations: false

  github-release:
    name: GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
